<!--
  Engage Colorado — toolbar lockup (mark + wordmark, side-by-side).
  Use this asset for email signatures, presentation decks, letterhead,
  and any context where the publication needs to identify itself with
  both the EC monogram and the full wordmark.
  Not used in the live site chrome (toolbar uses wordmark only).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 80">
  <!-- Mark: white square with navy EC -->
  <rect x="0" y="4" width="72" height="72" fill="#ffffff" stroke="#e0dcd2" stroke-width="1"/>
  <text x="36" y="58" font-family="'Newsreader', Georgia, 'Times New Roman', serif"
        font-style="italic" font-size="56" font-weight="500"
        fill="#1a3a52" text-anchor="middle" letter-spacing="-1">EC</text>

  <!-- Wordmark: italic serif "Engage Colorado" -->
  <text x="92" y="52" font-family="'Newsreader', Georgia, 'Times New Roman', serif"
        font-style="italic" font-size="36" font-weight="400"
        fill="#0f2638" letter-spacing="-0.5">Engage Colorado</text>
</svg>
